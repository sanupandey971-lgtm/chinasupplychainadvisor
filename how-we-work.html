<!DOCTYPE html>
<html lang="en">
<head>
<title>How We Work</title>
</head>

<body>

<h1>How Our Investigation Process Works</h1>

<ol>
<li>Client submits supplier or project information</li>
<li>We collect corporate intelligence data</li>
<li>Field or network investigation is conducted</li>
<li>Risk analysis report is produced</li>
<li>Client receives actionable recommendations</li>
</ol>

</body>
</html>
<!-- Back to Parent button -->
<div style="text-align: center; margin: 20px 0 10px 0;">
  <button onclick="
    (function(){
      let path = window.location.pathname;
      if(path.endsWith('/')) path = path.slice(0,-1);
      const parent = path.substring(0,path.lastIndexOf('/'));
      window.location.href = parent === '' ? '/index.html' : parent + '/';
    })()
  " style="
    padding: 12px 24px;
    background-color: #0b1f3a;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
  ">
    ← Back to Parent
  </button>
</div>

<script>
  const btn = document.querySelector('button[onclick]');
  btn.onmouseover = () => btn.style.backgroundColor = '#12325a';
  btn.onmouseout = () => btn.style.backgroundColor = '#0b1f3a';
</script>
