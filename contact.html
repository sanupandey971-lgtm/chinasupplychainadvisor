<!DOCTYPE html>
<html lang="en">
<head>
<title>Contact China Supply Chain Advisor</title>
</head>

<body>

<h1>Request Investigation</h1>

<form>

<p>Company Name</p>
<input type="text">

<p>Supplier Name</p>
<input type="text">

<p>Email</p>
<input type="email">

<p>Investigation Requirement</p>
<textarea></textarea>

<br><br>
<button>Submit Request</button>

</form>

</body>
</html>
<!-- Direct Email Button -->
<div style="text-align:center; margin-top:30px;">

<a href="mailto:hong@chinasupplychainadvisor.com?subject=Supplier Investigation Request"
style="
background-color:#f5a623;
color:white;
padding:14px 28px;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:6px;
display:inline-block;
transition:background-color 0.3s;
">

Email Investigation Request

</a>

</div>

<script>
const emailBtn = document.querySelector('a[href^="mailto"]');

emailBtn.onmouseover = () => {
emailBtn.style.backgroundColor = '#e5941f';
};

emailBtn.onmouseout = () => {
emailBtn.style.backgroundColor = '#f5a623';
};
</script>
<!-- Back to Parent button -->
<div style="text-align: center; margin: 20px 0 10px 0;">
  <button onclick="
    (function(){
      let path = window.location.pathname;
      if(path.endsWith('/')) path = path.slice(0,-1);
      const parent = path.substring(0,path.lastIndexOf('/'));
      window.location.href = parent === '' ? '/index.html' : parent + '/';
    })()
  " style="
    padding: 12px 24px;
    background-color: #0b1f3a;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
  ">
    ← Back to Parent
  </button>
</div>

<script>
  const btn = document.querySelector('button[onclick]');
  btn.onmouseover = () => btn.style.backgroundColor = '#12325a';
  btn.onmouseout = () => btn.style.backgroundColor = '#0b1f3a';
</script>
