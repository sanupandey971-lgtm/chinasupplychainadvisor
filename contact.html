<!DOCTYPE html>
<html lang="en">

<head>

<title>Request Supplier Verification | China Supply Chain Advisor</title>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="Request supplier verification or factory investigation in China. Independent investigation for international buyers.">

<link rel="icon" href="/favicon.ico">

</head>

<body>

<h1>Request Investigation</h1>

<form>

<p>Company Name</p>
<input type="text">

<p>Supplier Name</p>
<input type="text">

<p>Email</p>
<input type="email">

<p>Investigation Requirement</p>
<textarea></textarea>

<br><br>

<button>Request Supplier Verification</button>
<button style="
background-color:#f5a623;
color:white;
padding:10px 22px;
border:none;
font-size:16px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
">
Request Supplier Verification
</button>
<!-- Direct Email Button -->
<a href="mailto:hong@chinasupplychainadvisor.com?subject=Supplier Verification Request"
style="
background-color:#f5a623;
color:white;
padding:10px 22px;
text-decoration:none;
font-size:16px;
font-weight:bold;
border-radius:6px;
margin-left:10px;
display:inline-block;
">

Email Request

</a>

</form>

<!-- Back to Parent button -->
<div style="text-align: center; margin: 20px 0 10px 0;">
  <button onclick="
    (function(){
      let path = window.location.pathname;
      if(path.endsWith('/')) path = path.slice(0,-1);
      const parent = path.substring(0,path.lastIndexOf('/'));
      window.location.href = parent === '' ? '/index.html' : parent + '/';
    })()
  " style="
    padding: 12px 24px;
    background-color: #0b1f3a;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
  ">
    ← Back to Parent
  </button>
</div>

<script>

const btn = document.querySelector('button[onclick]');

btn.onmouseover = () => btn.style.backgroundColor = '#12325a';
btn.onmouseout = () => btn.style.backgroundColor = '#0b1f3a';

</script>

</body>

</html>
