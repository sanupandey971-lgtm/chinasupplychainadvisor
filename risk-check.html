<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Free Supplier Risk Check | China Supply Chain Advisor</title>

<meta name="description" content="Free supplier risk check for Chinese manufacturers. Identify fraud, trading companies, and operational risks before placing large orders.">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
width:800px;
margin:auto;
background:white;
padding:40px;
margin-top:50px;
border-radius:8px;
}

h1{
text-align:center;
}

form{
margin-top:30px;
}

label{
display:block;
margin-top:15px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
}

button{
margin-top:20px;
background:#ff6a00;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e85c00;
}

</style>

</head>

<body>

<div class="container">

<h1>Free Chinese Supplier Risk Check</h1>

<p>
Submit your supplier details and our team will conduct a preliminary
risk review based on public records, company structure,
and export history.
</p>

<form action="https://formspree.io/f/yourformid" method="POST">

<label>Supplier Company Name *</label>
<input type="text" name="supplier" required>

<label>Website</label>
<input type="text" name="website">

<label>Product</label>
<input type="text" name="product">

<label>Estimated Order Value</label>
<input type="text" name="order_value">

<label>Country</label>
<input type="text" name="country">

<label>Your Email *</label>
<input type="email" name="email" required>

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Submit Risk Check</button>

</form>

<p style="margin-top:30px;text-align:center;">
Thank you. We will review the supplier risk within 24 hours.
</p>

</div>

</body>
</html>
